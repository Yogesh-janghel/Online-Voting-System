spring.application.name=Online-Voting-System

# Database Configuration (Uses ENV variables in production, defaults to local MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/votingdb?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CORS Configuration
frontend.url=${FRONTEND_URL:http://localhost:3000,http://localhost:5173,http://localhost:8081}

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.MySQL8Dialect}

jwt.secret=${JWT_SECRET:X7pL9qW3zT2rY8mF6vN4kJ5hB0cD1xA2uE3tR8wQ9eZ}
jwt.expiration=3600000

